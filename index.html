<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>since sidd happened</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='70' font-family='monospace' fill='white'>SD</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --fg: #fff;
    --fg-dim: #ccc;
    --fg-muted: #888;
    --fg-faint: #666;
    --fg-ghost: #555;
    --fg-hidden: #333;
    --fg-invisible: #222;
    --border: #222;
    --border-dim: #333;
    --hover-bg: #0a0a0a;
    --overlay-bg: rgba(0, 0, 0, 0.85);
    --panel-bg: #000;
    --pw-border: #1a1a1a;
    --pw-color: #222;
    --pw-hover-border: #333;
    --pw-hover-color: #444;
    --delete-hover-border: #600;
    --delete-hover-color: #f44;
  }

  :root.light {
    --bg: #fff;
    --fg: #000;
    --fg-dim: #333;
    --fg-muted: #666;
    --fg-faint: #888;
    --fg-ghost: #aaa;
    --fg-hidden: #bbb;
    --fg-invisible: #ddd;
    --border: #ddd;
    --border-dim: #ccc;
    --hover-bg: #f5f5f5;
    --overlay-bg: rgba(255, 255, 255, 0.85);
    --panel-bg: #fff;
    --pw-border: #e0e0e0;
    --pw-color: #ccc;
    --pw-hover-border: #bbb;
    --pw-hover-color: #999;
    --delete-hover-border: #fcc;
    --delete-hover-color: #c00;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }

  .site-title {
    font-size: 13px;
    color: var(--fg);
    letter-spacing: 2px;
    margin-bottom: 32px;
    text-transform: lowercase;
  }

  /* Calendar header */
  .cal-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
    user-select: none;
  }

  .cal-header button {
    background: none;
    border: 1px solid var(--border-dim);
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .cal-header button:hover { border-color: var(--fg-muted); }

  .cal-title {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.5px;
    min-width: 200px;
    text-align: center;
  }

  /* Calendar grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    width: 100%;
    max-width: 700px;
  }

  .cal-day-label {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px;
    text-align: center;
    font-size: 11px;
    color: var(--fg-ghost);
    letter-spacing: 1px;
  }

  .cal-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px;
    min-height: 70px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .cal-cell:hover { background: var(--hover-bg); }
  .cal-cell.empty { cursor: default; }
  .cal-cell.empty:hover { background: none; }

  .cal-cell .day-num {
    font-size: 12px;
    color: var(--fg-faint);
  }

  .cal-cell.today .day-num {
    color: var(--fg);
  }

  .cal-cell.has-entry .day-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: 1px solid var(--fg);
    border-radius: 50%;
  }

  /* Entry viewer overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .overlay.open { display: flex; }

  .entry-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .entry-date {
    font-size: 13px;
    color: var(--fg-muted);
  }

  .entry-close {
    background: none;
    border: none;
    color: var(--fg-ghost);
    font-family: inherit;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    transition: color 0.2s;
  }

  .entry-close:hover { color: var(--fg); }

  .entry-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--fg-dim);
    font-size: 13px;
  }

  .entry-body.empty {
    color: var(--fg-hidden);
    font-style: italic;
  }

  /* Editor (only visible when authenticated) */
  .entry-editor {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .entry-editor.active { display: flex; }

  .entry-editor textarea {
    flex: 1;
    background: var(--panel-bg);
    color: var(--fg-dim);
    border: none;
    padding: 20px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.7;
    resize: none;
    outline: none;
  }

  .entry-editor textarea::placeholder { color: var(--fg-hidden); }

  .entry-actions {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    justify-content: flex-end;
  }

  .entry-actions button {
    background: none;
    border: 1px solid var(--border-dim);
    color: var(--fg-muted);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .entry-actions button:hover {
    border-color: var(--fg-muted);
    color: var(--fg);
  }

  .entry-actions .save-btn:hover {
    border-color: var(--fg);
  }

  .entry-actions .delete-btn:hover {
    border-color: var(--delete-hover-border);
    color: var(--delete-hover-color);
  }

  /* Password tab */
  .pw-tab {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 50;
  }

  .pw-toggle {
    background: none;
    border: 1px solid var(--pw-border);
    color: var(--pw-color);
    font-family: inherit;
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .pw-toggle:hover {
    border-color: var(--pw-hover-border);
    color: var(--pw-hover-color);
  }

  .pw-toggle.authed {
    border-color: var(--border);
    color: var(--pw-hover-color);
  }

  .pw-input-wrap {
    display: none;
    margin-bottom: 6px;
  }

  .pw-input-wrap.open { display: block; }

  .pw-input {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    width: 160px;
    outline: none;
  }

  .pw-input::placeholder { color: var(--fg-hidden); }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: none;
    border: 1px solid var(--pw-border);
    color: var(--pw-color);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 50;
  }

  .theme-toggle:hover {
    border-color: var(--pw-hover-border);
    color: var(--pw-hover-color);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">&#9790;</button>

<div class="site-title">since sidd happened</div>

<div class="cal-header">
  <button onclick="changeMonth(-1)">&larr;</button>
  <div class="cal-title" id="calTitle"></div>
  <button onclick="changeMonth(1)">&rarr;</button>
</div>

<div class="cal-grid" id="calGrid"></div>

<!-- Entry overlay -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="entry-panel">
    <div class="entry-header">
      <div class="entry-date" id="entryDate"></div>
      <button class="entry-close" onclick="closeEntry()">&times;</button>
    </div>
    <!-- Read-only view -->
    <div class="entry-body" id="entryBody"></div>
    <!-- Editor (auth only) -->
    <div class="entry-editor" id="entryEditor">
      <textarea id="entryTextarea" placeholder="what's on your mind..."></textarea>
      <div class="entry-actions">
        <button class="delete-btn" onclick="deleteEntry()">delete</button>
        <button class="save-btn" onclick="saveEntry()">save</button>
      </div>
    </div>
  </div>
</div>

<!-- Password tab -->
<div class="pw-tab">
  <div class="pw-input-wrap" id="pwWrap">
    <input type="password" class="pw-input" id="pwInput" placeholder="password" onkeydown="checkPw(event)">
  </div>
  <button class="pw-toggle" id="pwToggle" onclick="togglePw()">
    <span id="pwLabel">&middot;&middot;&middot;</span>
  </button>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const PW = 'lego240706';

let currentYear, currentMonth;
let authenticated = false;
let selectedDate = null;
let entriesCache = {};

async function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  await fetchEntries();
  render();
}

async function fetchEntries() {
  try {
    const res = await fetch('/api/entries');
    entriesCache = await res.json();
  } catch {
    entriesCache = {};
  }
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function render() {
  const title = document.getElementById('calTitle');
  title.textContent = `${MONTHS[currentMonth]} ${currentYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const key = dateKey(currentYear, currentMonth, d);
    const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d;
    const hasEntry = entriesCache[key] && entriesCache[key].trim().length > 0;

    el.className = 'cal-cell' + (isToday ? ' today' : '') + (hasEntry ? ' has-entry' : '');
    el.innerHTML = `<span class="day-num">${d}</span>`;
    el.onclick = () => openDay(currentYear, currentMonth, d);
    grid.appendChild(el);
  }

  const totalCells = firstDay + daysInMonth;
  const remainder = totalCells % 7;
  if (remainder !== 0) {
    for (let i = 0; i < 7 - remainder; i++) {
      const el = document.createElement('div');
      el.className = 'cal-cell empty';
      grid.appendChild(el);
    }
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
}

function openDay(y, m, d) {
  selectedDate = dateKey(y, m, d);
  const content = entriesCache[selectedDate] || '';

  const dateObj = new Date(y, m, d);
  document.getElementById('entryDate').textContent =
    `${DAYS[dateObj.getDay()]}  ${MONTHS[m]} ${d}, ${y}`;

  const body = document.getElementById('entryBody');
  const editor = document.getElementById('entryEditor');
  const textarea = document.getElementById('entryTextarea');

  const now = new Date();
  const todayKey = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
  const isToday = selectedDate === todayKey;

  if (authenticated && isToday) {
    body.style.display = 'none';
    editor.classList.add('active');
    textarea.value = content;
    setTimeout(() => textarea.focus(), 50);
  } else {
    editor.classList.remove('active');
    body.style.display = '';
    if (content.trim()) {
      body.textContent = content;
      body.classList.remove('empty');
    } else {
      body.textContent = 'nothing here yet';
      body.classList.add('empty');
    }
  }

  document.getElementById('overlay').classList.add('open');
}

function closeEntry() {
  document.getElementById('overlay').classList.remove('open');
  selectedDate = null;
}

function closeOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeEntry();
}

async function saveEntry() {
  if (!authenticated || !selectedDate) return;
  const text = document.getElementById('entryTextarea').value;
  await fetch('/api/entries', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: PW, date: selectedDate, content: text }),
  });
  await fetchEntries();
  closeEntry();
  render();
}

async function deleteEntry() {
  if (!authenticated || !selectedDate) return;
  await fetch('/api/entries', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: PW, date: selectedDate }),
  });
  await fetchEntries();
  closeEntry();
  render();
}

function togglePw() {
  if (authenticated) {
    authenticated = false;
    document.getElementById('pwToggle').classList.remove('authed');
    document.getElementById('pwLabel').innerHTML = '&middot;&middot;&middot;';
    document.getElementById('pwWrap').classList.remove('open');
    return;
  }
  document.getElementById('pwWrap').classList.toggle('open');
  if (document.getElementById('pwWrap').classList.contains('open')) {
    document.getElementById('pwInput').focus();
  }
}

function checkPw(e) {
  if (e.key !== 'Enter') return;
  const val = document.getElementById('pwInput').value;
  if (val === PW) {
    authenticated = true;
    document.getElementById('pwToggle').classList.add('authed');
    document.getElementById('pwLabel').textContent = 'writing';
    document.getElementById('pwWrap').classList.remove('open');
    document.getElementById('pwInput').value = '';
  } else {
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').placeholder = 'wrong';
    setTimeout(() => { document.getElementById('pwInput').placeholder = 'password'; }, 1000);
  }
}

function toggleTheme() {
  const root = document.documentElement;
  const isLight = root.classList.toggle('light');
  localStorage.setItem('journal_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeToggle').innerHTML = isLight ? '&#9728;' : '&#9790;';
}

function loadTheme() {
  const saved = localStorage.getItem('journal_theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('themeToggle').innerHTML = '&#9728;';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEntry();
});

loadTheme();
init();
</script>
</body>
</html>
