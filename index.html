<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>since sidd happened</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .site-title {
    font-size: 13px;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 32px;
    text-transform: lowercase;
  }

  /* Calendar header */
  .cal-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
    user-select: none;
  }

  .cal-header button {
    background: none;
    border: 1px solid #333;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .cal-header button:hover { border-color: #888; }

  .cal-title {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.5px;
    min-width: 200px;
    text-align: center;
  }

  /* Calendar grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-top: 1px solid #222;
    border-left: 1px solid #222;
    width: 100%;
    max-width: 700px;
  }

  .cal-day-label {
    border-right: 1px solid #222;
    border-bottom: 1px solid #222;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
  }

  .cal-cell {
    border-right: 1px solid #222;
    border-bottom: 1px solid #222;
    padding: 10px;
    min-height: 70px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .cal-cell:hover { background: #0a0a0a; }
  .cal-cell.empty { cursor: default; }
  .cal-cell.empty:hover { background: none; }

  .cal-cell .day-num {
    font-size: 12px;
    color: #666;
  }

  .cal-cell.today .day-num {
    color: #fff;
  }

  .cal-cell.has-entry .day-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: 1px solid #fff;
    border-radius: 50%;
  }

  /* Entry viewer overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .overlay.open { display: flex; }

  .entry-panel {
    background: #000;
    border: 1px solid #222;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid #222;
  }

  .entry-date {
    font-size: 13px;
    color: #888;
  }

  .entry-close {
    background: none;
    border: none;
    color: #555;
    font-family: inherit;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    transition: color 0.2s;
  }

  .entry-close:hover { color: #fff; }

  .entry-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
    line-height: 1.7;
    white-space: pre-wrap;
    color: #ccc;
    font-size: 13px;
  }

  .entry-body.empty {
    color: #333;
    font-style: italic;
  }

  /* Editor (only visible when authenticated) */
  .entry-editor {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .entry-editor.active { display: flex; }

  .entry-editor textarea {
    flex: 1;
    background: #000;
    color: #ccc;
    border: none;
    padding: 20px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.7;
    resize: none;
    outline: none;
  }

  .entry-editor textarea::placeholder { color: #333; }

  .entry-actions {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid #222;
    justify-content: flex-end;
  }

  .entry-actions button {
    background: none;
    border: 1px solid #333;
    color: #888;
    font-family: inherit;
    font-size: 12px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .entry-actions button:hover {
    border-color: #888;
    color: #fff;
  }

  .entry-actions .save-btn:hover {
    border-color: #fff;
  }

  .entry-actions .delete-btn:hover {
    border-color: #600;
    color: #f44;
  }

  /* Password tab */
  .pw-tab {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 50;
  }

  .pw-toggle {
    background: none;
    border: 1px solid #1a1a1a;
    color: #222;
    font-family: inherit;
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .pw-toggle:hover {
    border-color: #333;
    color: #444;
  }

  .pw-toggle.authed {
    border-color: #222;
    color: #444;
  }

  .pw-input-wrap {
    display: none;
    margin-bottom: 6px;
  }

  .pw-input-wrap.open { display: block; }

  .pw-input {
    background: #000;
    border: 1px solid #222;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    width: 160px;
    outline: none;
  }

  .pw-input::placeholder { color: #333; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #222; }
</style>
</head>
<body>

<div class="site-title">since sidd happened</div>

<div class="cal-header">
  <button onclick="changeMonth(-1)">&larr;</button>
  <div class="cal-title" id="calTitle"></div>
  <button onclick="changeMonth(1)">&rarr;</button>
</div>

<div class="cal-grid" id="calGrid"></div>

<!-- Entry overlay -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="entry-panel">
    <div class="entry-header">
      <div class="entry-date" id="entryDate"></div>
      <button class="entry-close" onclick="closeEntry()">&times;</button>
    </div>
    <!-- Read-only view -->
    <div class="entry-body" id="entryBody"></div>
    <!-- Editor (auth only) -->
    <div class="entry-editor" id="entryEditor">
      <textarea id="entryTextarea" placeholder="what's on your mind..."></textarea>
      <div class="entry-actions">
        <button class="delete-btn" onclick="deleteEntry()">delete</button>
        <button class="save-btn" onclick="saveEntry()">save</button>
      </div>
    </div>
  </div>
</div>

<!-- Password tab -->
<div class="pw-tab">
  <div class="pw-input-wrap" id="pwWrap">
    <input type="password" class="pw-input" id="pwInput" placeholder="password" onkeydown="checkPw(event)">
  </div>
  <button class="pw-toggle" id="pwToggle" onclick="togglePw()">
    <span id="pwLabel">&middot;&middot;&middot;</span>
  </button>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const PW = 'lego240706';

let currentYear, currentMonth;
let authenticated = false;
let selectedDate = null;

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  render();
}

function getEntries() {
  try { return JSON.parse(localStorage.getItem('journal_entries') || '{}'); }
  catch { return {}; }
}

function setEntries(entries) {
  localStorage.setItem('journal_entries', JSON.stringify(entries));
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function render() {
  const title = document.getElementById('calTitle');
  title.textContent = `${MONTHS[currentMonth]} ${currentYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day labels
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const entries = getEntries();
  const today = new Date();

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const key = dateKey(currentYear, currentMonth, d);
    const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d;
    const hasEntry = entries[key] && entries[key].trim().length > 0;

    el.className = 'cal-cell' + (isToday ? ' today' : '') + (hasEntry ? ' has-entry' : '');
    el.innerHTML = `<span class="day-num">${d}</span>`;
    el.onclick = () => openDay(currentYear, currentMonth, d);
    grid.appendChild(el);
  }

  // Fill remaining cells to complete the grid
  const totalCells = firstDay + daysInMonth;
  const remainder = totalCells % 7;
  if (remainder !== 0) {
    for (let i = 0; i < 7 - remainder; i++) {
      const el = document.createElement('div');
      el.className = 'cal-cell empty';
      grid.appendChild(el);
    }
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
}

function openDay(y, m, d) {
  selectedDate = dateKey(y, m, d);
  const entries = getEntries();
  const content = entries[selectedDate] || '';

  const dateObj = new Date(y, m, d);
  document.getElementById('entryDate').textContent =
    `${DAYS[dateObj.getDay()]}  ${MONTHS[m]} ${d}, ${y}`;

  const body = document.getElementById('entryBody');
  const editor = document.getElementById('entryEditor');
  const textarea = document.getElementById('entryTextarea');

  const now = new Date();
  const todayKey = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
  const isToday = selectedDate === todayKey;

  if (authenticated && isToday) {
    body.style.display = 'none';
    editor.classList.add('active');
    textarea.value = content;
    setTimeout(() => textarea.focus(), 50);
  } else {
    editor.classList.remove('active');
    body.style.display = '';
    if (content.trim()) {
      body.textContent = content;
      body.classList.remove('empty');
    } else {
      body.textContent = 'nothing here yet';
      body.classList.add('empty');
    }
  }

  document.getElementById('overlay').classList.add('open');
}

function closeEntry() {
  document.getElementById('overlay').classList.remove('open');
  selectedDate = null;
}

function closeOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeEntry();
}

function saveEntry() {
  if (!authenticated || !selectedDate) return;
  const text = document.getElementById('entryTextarea').value;
  const entries = getEntries();
  if (text.trim()) {
    entries[selectedDate] = text;
  } else {
    delete entries[selectedDate];
  }
  setEntries(entries);
  closeEntry();
  render();
}

function deleteEntry() {
  if (!authenticated || !selectedDate) return;
  const entries = getEntries();
  delete entries[selectedDate];
  setEntries(entries);
  closeEntry();
  render();
}

function togglePw() {
  if (authenticated) {
    authenticated = false;
    document.getElementById('pwToggle').classList.remove('authed');
    document.getElementById('pwLabel').innerHTML = '&middot;&middot;&middot;';
    document.getElementById('pwWrap').classList.remove('open');
    return;
  }
  document.getElementById('pwWrap').classList.toggle('open');
  if (document.getElementById('pwWrap').classList.contains('open')) {
    document.getElementById('pwInput').focus();
  }
}

function checkPw(e) {
  if (e.key !== 'Enter') return;
  const val = document.getElementById('pwInput').value;
  if (val === PW) {
    authenticated = true;
    document.getElementById('pwToggle').classList.add('authed');
    document.getElementById('pwLabel').textContent = 'writing';
    document.getElementById('pwWrap').classList.remove('open');
    document.getElementById('pwInput').value = '';
  } else {
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').placeholder = 'wrong';
    setTimeout(() => { document.getElementById('pwInput').placeholder = 'password'; }, 1000);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEntry();
});

init();
</script>
</body>
</html>
